<!DOCTYPE html>
<html lang="en" x-data="portfolio()" :class="{ 'dark': darkMode }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jason Zhang — Data Scientist</title>
  <meta name="description" content="Portfolio of Jason Zhang, a Data Scientist turning chaotic data into elegant narratives." />

  <!-- ============================= -->
  <!--  FONTS — Playfair Display + Inter  -->
  <!-- ============================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
    rel="stylesheet"
  />

  <!-- ============================= -->
  <!--  TAILWIND CSS (CDN — no build step) -->
  <!-- ============================= -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            sans: ['"Inter"', 'system-ui', 'sans-serif'],
          },
          colors: {
            surface: { light: '#fafaf9', dark: '#0f0f0f' },
            ink:     { light: '#1c1917', dark: '#e7e5e4'  },
            accent:       '#6366f1',
            'accent-hover':'#818cf8',
          },
        },
      },
    };
  </script>

  <!-- ============================= -->
  <!--  ALPINE.JS (CDN — handles all reactivity)            -->
  <!--  NOTE: defer is required so Alpine boots after DOM    -->
  <!-- ============================= -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- ============================= -->
  <!--  LUCIDE ICONS (CDN)                                   -->
  <!-- ============================= -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- ============================= -->
  <!--  CUSTOM STYLES                                        -->
  <!-- ============================= -->
  <style>
    /* ---------- Base ---------- */
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; }

    /* ---------- Dot-Grid Background ---------- */
    .dot-grid {
      background-image: radial-gradient(circle, #d4d4d4 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .dark .dot-grid {
      background-image: radial-gradient(circle, #2a2a2a 1px, transparent 1px);
    }

    /* ---------- Glassmorphism Navbar ---------- */
    .glass-nav {
      backdrop-filter: blur(14px) saturate(160%);
      -webkit-backdrop-filter: blur(14px) saturate(160%);
    }

    /* ---------- Timeline vertical line ---------- */
    .timeline-line {
      position: absolute; left: 7px; top: 0; bottom: 0; width: 2px;
      background: linear-gradient(to bottom, #6366f1, transparent);
    }

    /* ---------- Micro-interaction: hover lift ---------- */
    .hover-lift {
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px -6px rgba(0,0,0,0.12);
    }
    .dark .hover-lift:hover {
      box-shadow: 0 12px 28px -6px rgba(255,255,255,0.06);
    }

    /* ---------- Badge ---------- */
    .badge {
      @apply text-xs font-medium px-2.5 py-0.5 rounded-full;
    }

    /* ---------- Section fade-in on scroll ---------- */
    .fade-section {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fade-section.visible { opacity: 1; transform: translateY(0); }

    /* ---------- Methodology pipeline connector ---------- */
    .pipeline-connector { position: relative; }
    .pipeline-connector::after {
      content: ''; position: absolute;
      top: 50%; right: -1.25rem;
      width: 1.25rem; height: 2px;
      background: #6366f1; opacity: 0.4;
    }
    .pipeline-connector:last-child::after { display: none; }
    @media (max-width: 639px) {
      .pipeline-connector::after {
        top: auto; bottom: -1.25rem; right: 50%;
        width: 2px; height: 1.25rem;
        transform: translateX(50%);
      }
    }

    /* ---------- GitHub heatmap cells ---------- */
    .heatmap-cell { transition: transform 0.15s ease; }
    .heatmap-cell:hover { transform: scale(1.8); z-index: 10; }

    /* ---------- Publication type indicator ---------- */
    .pub-line {
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      border-radius: 2px;
    }

    /* ---------- Loading skeleton pulse ---------- */
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
    .skeleton-pulse { animation: pulse 1.5s ease-in-out infinite; }
  </style>
</head>

<!-- ================================================================ -->
<!--  BODY                                                            -->
<!-- ================================================================ -->
<body
  class="dot-grid min-h-screen
         bg-surface-light text-ink-light
         dark:bg-surface-dark dark:text-ink-dark
         transition-colors duration-300"
>

  <!-- ============================================================== -->
  <!--  LOADING STATE — shown while JSON is being fetched              -->
  <!-- ============================================================== -->
  <template x-if="!loaded">    <div class="flex items-center justify-center min-h-screen">
      <div class="text-center">
        <div class="w-8 h-8 border-2 border-accent border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
        <p class="text-sm text-neutral-400 skeleton-pulse">Loading portfolio…</p>
      </div>
    </div>
  </template>

  <!-- ============================================================== -->
  <!--  MAIN CONTENT — rendered once JSON is loaded                    -->
  <!-- ============================================================== -->
  <template x-if="loaded">
    <div>

      <!-- ========================================================== -->
      <!--  NAVBAR — Sticky + Glassmorphism                            -->
      <!-- ========================================================== -->
      <nav class="glass-nav fixed top-0 inset-x-0 z-50
                  bg-white/70 dark:bg-neutral-900/70
                  border-b border-neutral-200 dark:border-neutral-800">
        <div class="max-w-5xl mx-auto flex items-center justify-between px-6 py-3">
          <a href="#hero" class="font-serif text-lg font-semibold tracking-tight">
            <span x-text="d.meta.initials"></span><span class="text-accent">.</span>
          </a>          <div class="hidden sm:flex items-center gap-6 text-sm font-medium">
            <a href="#experience"   class="hover:text-accent transition-colors">Experience</a>
            <a href="#education"    class="hover:text-accent transition-colors">Education</a>
            <a href="#projects"     class="hover:text-accent transition-colors">Projects</a>
            <a href="#publications" class="hover:text-accent transition-colors">Research</a>
            <a href="#methodology"  class="hover:text-accent transition-colors">Process</a>
            <a href="#stack"        class="hover:text-accent transition-colors">Stack</a>
            <a href="#contact"      class="hover:text-accent transition-colors">Contact</a>
          </div>

          <div class="flex items-center gap-2">
            <!-- Mobile hamburger -->
            <button @click="mobileNav = !mobileNav"
                    class="sm:hidden p-2 rounded-full hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-colors"
                    aria-label="Menu">
              <i x-show="!mobileNav" data-lucide="menu" class="w-5 h-5"></i>
              <i x-show="mobileNav" data-lucide="x" class="w-5 h-5"></i>
            </button>

            <!-- Dark Mode Toggle -->
            <button @click="darkMode = !darkMode"
                    class="p-2 rounded-full hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-colors"
                    aria-label="Toggle dark mode">
              <template x-if="darkMode"><i data-lucide="sun"  class="w-5 h-5"></i></template>
              <template x-if="!darkMode"><i data-lucide="moon" class="w-5 h-5"></i></template>
            </button>
          </div>
        </div>

        <!-- Mobile nav dropdown -->
        <div x-show="mobileNav" x-transition @click.away="mobileNav = false"
             class="sm:hidden px-6 pb-4 flex flex-col gap-3 text-sm font-medium">
          <a href="#experience"   @click="mobileNav=false" class="hover:text-accent transition-colors">Experience</a>
          <a href="#education"    @click="mobileNav=false" class="hover:text-accent transition-colors">Education</a>
          <a href="#projects"     @click="mobileNav=false" class="hover:text-accent transition-colors">Projects</a>
          <a href="#publications" @click="mobileNav=false" class="hover:text-accent transition-colors">Research</a>
          <a href="#methodology"  @click="mobileNav=false" class="hover:text-accent transition-colors">Process</a>
          <a href="#stack"        @click="mobileNav=false" class="hover:text-accent transition-colors">Stack</a>
          <a href="#contact"      @click="mobileNav=false" class="hover:text-accent transition-colors">Contact</a>
        </div>
      </nav>


      <!-- ========================================================== -->
      <!--  HERO SECTION                                               -->
      <!-- ========================================================== -->      <section id="hero" class="pt-32 pb-20 px-6">
        <div class="max-w-3xl mx-auto text-center fade-section">
          <p class="text-sm tracking-widest uppercase text-accent mb-4" x-text="d.meta.title"></p>
          <h1 class="font-serif text-5xl sm:text-6xl font-bold leading-tight mb-6" x-text="d.meta.name"></h1>
          <p class="text-xl sm:text-2xl font-light text-neutral-600 dark:text-neutral-400 max-w-xl mx-auto mb-10">
            <span x-text="d.meta.taglineBefore"></span>
            <em class="font-serif italic" x-text="' ' + d.meta.taglineHighlight1 + ' '"></em>
            <span x-text="d.meta.taglineMiddle"></span>
            <em class="font-serif italic" x-text="' ' + d.meta.taglineHighlight2"></em>.
          </p>

          <!-- Social links -->
          <div class="flex items-center justify-center gap-5">
            <a :href="d.social.linkedin" target="_blank" rel="noopener noreferrer"
               class="hover-lift p-3 rounded-xl bg-white dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700"
               aria-label="LinkedIn">
              <i data-lucide="linkedin" class="w-5 h-5"></i>
            </a>
            <a :href="d.social.github" target="_blank" rel="noopener noreferrer"
               class="hover-lift p-3 rounded-xl bg-white dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700"
               aria-label="GitHub">
              <i data-lucide="github" class="w-5 h-5"></i>
            </a>
            <a :href="'mailto:' + d.social.email"
               class="hover-lift p-3 rounded-xl bg-white dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700"
               aria-label="Email">
              <i data-lucide="mail" class="w-5 h-5"></i>
            </a>            <a :href="d.social.scholar" target="_blank" rel="noopener noreferrer"
               class="hover-lift p-3 rounded-xl bg-white dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700"
               aria-label="Google Scholar">
              <i data-lucide="book-marked" class="w-5 h-5"></i>
            </a>
          </div>
        </div>
      </section>


      <!-- ========================================================== -->
      <!--  EXPERIENCE TIMELINE (JSON-driven)                          -->
      <!-- ========================================================== -->
      <section id="experience" class="py-20 px-6">        <div class="max-w-3xl mx-auto fade-section">
          <h2 class="font-serif text-3xl font-bold mb-12">Experience</h2>
          <div class="relative">
            <div class="timeline-line"></div>
            <template x-for="(job, i) in d.experience" :key="i">
              <div class="relative pl-10 pb-10">
                <div class="absolute left-0 top-1 w-4 h-4 rounded-full bg-accent border-4 border-surface-light dark:border-surface-dark"></div>
                <p class="text-xs tracking-widest uppercase text-accent mb-1" x-text="job.dates"></p>
                <h3 class="font-serif text-xl font-semibold" x-text="job.role"></h3>
                <p class="text-sm text-neutral-500 dark:text-neutral-400 mb-2" x-text="job.company"></p>
                <p class="text-sm leading-relaxed text-neutral-600 dark:text-neutral-400" x-text="job.description"></p>
              </div>
            </template>
          </div>
        </div>
      </section>


      <!-- ========================================================== -->
      <!--  EDUCATION (JSON-driven)                                    -->
      <!-- ========================================================== -->
      <section id="education" class="py-20 px-6 bg-neutral-50 dark:bg-neutral-900/50">
        <div class="max-w-3xl mx-auto fade-section">
          <h2 class="font-serif text-3xl font-bold mb-12">Education</h2>
          <div class="space-y-8">
            <template x-for="(edu, i) in d.education" :key="i">
              <div class="flex items-start gap-4">
                <div class="mt-1.5 flex-shrink-0">
                  <i data-lucide="graduation-cap" class="w-5 h-5 text-accent"></i>
                </div>
                <div>
                  <h3 class="font-serif text-lg font-semibold" x-text="edu.degree"></h3>
                  <p class="text-sm text-neutral-500 dark:text-neutral-400" x-text="edu.institution + ' · ' + edu.year"></p>
                  <p class="text-sm text-neutral-600 dark:text-neutral-400 mt-1" x-html="edu.detail"></p>
                </div>
              </div>
            </template>
          </div>
        </div>
      </section>


      <!-- ========================================================== -->
      <!--  SELECTED PROJECTS (JSON-driven)                            -->
      <!-- ========================================================== -->
      <section id="projects" class="py-20 px-6">
        <div class="max-w-5xl mx-auto fade-section">
          <h2 class="font-serif text-3xl font-bold mb-4">Selected Projects</h2>
          <p class="text-neutral-500 dark:text-neutral-400 mb-12 max-w-xl">
            Impact-driven work — each card highlights the <strong>business result</strong>, not just the tech.
          </p>
          <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
            <template x-for="(proj, i) in d.projects" :key="i">
              <div class="hover-lift rounded-2xl p-6 bg-white dark:bg-neutral-800/60 border border-neutral-200 dark:border-neutral-700 flex flex-col">
                <div class="flex items-center gap-2 mb-3">
                  <i :data-lucide="proj.icon" class="w-5 h-5 text-accent"></i>
                  <h3 class="font-serif text-lg font-semibold" x-text="proj.title"></h3>
                </div>
                <p class="text-sm font-medium text-accent mb-2" x-text="proj.impact"></p>
                <p class="text-sm text-neutral-600 dark:text-neutral-400 leading-relaxed flex-grow" x-text="proj.description"></p>                <div class="flex flex-wrap gap-1.5 mt-4 mb-4">
                  <template x-for="(tool, j) in proj.tools" :key="j">
                    <span class="badge bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300" x-text="tool"></span>
                  </template>
                </div>
                <a :href="proj.github" target="_blank" rel="noopener noreferrer"
                   class="inline-flex items-center gap-1.5 text-sm font-medium text-accent hover:text-accent-hover transition-colors mt-auto">
                  <i data-lucide="github" class="w-4 h-4"></i> View on GitHub
                </a>
              </div>
            </template>
          </div>
        </div>
      </section>


      <!-- ========================================================== -->
      <!--  ★ NEW FEATURE 1: PUBLICATIONS & TALKS                     -->
      <!--  Shows thought leadership — critical for DS leaders         -->
      <!-- ========================================================== -->
      <section id="publications" class="py-20 px-6 bg-neutral-50 dark:bg-neutral-900/50">
        <div class="max-w-3xl mx-auto fade-section">
          <h2 class="font-serif text-3xl font-bold mb-4">Publications & Talks</h2>
          <p class="text-neutral-500 dark:text-neutral-400 mb-10 max-w-xl">
            Peer-reviewed work and conference presentations — with a
            <span class="text-accent font-medium">TL;DR</span> for each.
          </p>

          <div class="space-y-4">
            <template x-for="(pub, i) in d.publications" :key="i">
              <div class="hover-lift relative pl-5 rounded-xl p-5 bg-white dark:bg-neutral-800/60 border border-neutral-200 dark:border-neutral-700">
                <!-- Color bar: indigo for papers, emerald for talks -->
                <div class="pub-line"
                     :class="pub.type === 'paper' ? 'bg-accent' : 'bg-emerald-500'"></div>
                <div class="flex items-start justify-between gap-4">
                  <div class="flex-grow">
                    <div class="flex items-center gap-2 mb-1">
                      <span class="badge"
                            :class="pub.type === 'paper'
                              ? 'bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300'
                              : 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300'"
                            x-text="pub.type === 'paper' ? '📄 Paper' : '🎤 Talk'">
                      </span>
                      <span class="text-xs text-neutral-400" x-text="pub.year"></span>
                    </div>
                    <h3 class="font-serif text-base font-semibold leading-snug mb-1" x-text="pub.title"></h3>
                    <p class="text-xs text-neutral-500 dark:text-neutral-400 mb-2" x-text="pub.venue"></p>
                    <p class="text-sm text-neutral-600 dark:text-neutral-400 italic">
                      <span class="text-accent font-medium not-italic">TL;DR:</span>
                      <span x-text="' ' + pub.tldr"></span>
                    </p>
                  </div>
                  <a :href="pub.link" target="_blank" rel="noopener noreferrer"
                     class="flex-shrink-0 p-2 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-700 transition-colors"
                     aria-label="View publication">
                    <i data-lucide="external-link" class="w-4 h-4 text-accent"></i>
                  </a>
                </div>
              </div>
            </template>
          </div>

          <!-- Google Scholar link -->
          <div class="mt-8">
            <a :href="d.social.scholar" target="_blank" rel="noopener noreferrer"
               class="inline-flex items-center gap-2 text-sm font-medium text-accent hover:text-accent-hover transition-colors">
              <i data-lucide="book-marked" class="w-4 h-4"></i>
              View full profile on Google Scholar →
            </a>
          </div>
        </div>
      </section>


      <!-- ========================================================== -->
      <!--  ★ NEW FEATURE 2: METHODOLOGY / "HOW I WORK" PIPELINE      -->
      <!--  An interactive DS process diagram — shows maturity         -->
      <!-- ========================================================== -->
      <section id="methodology" class="py-20 px-6">
        <div class="max-w-4xl mx-auto fade-section">
          <h2 class="font-serif text-3xl font-bold mb-4">How I Work</h2>
          <p class="text-neutral-500 dark:text-neutral-400 mb-12 max-w-xl">
            A repeatable, opinionated process — from ambiguous questions to monitored production systems.
          </p>

          <!-- Pipeline steps -->          <div class="flex flex-col sm:flex-row items-center sm:items-start justify-between gap-5 sm:gap-0 mb-10">
            <template x-for="(step, i) in d.methodology" :key="i">
              <div class="pipeline-connector flex flex-col items-center text-center flex-1 cursor-pointer group"
                   @click="activeStep = (activeStep === i ? null : i)">
                <div class="w-14 h-14 rounded-2xl flex items-center justify-center mb-3 transition-all duration-300 border-2"
                     :class="activeStep === i
                       ? 'bg-accent text-white border-accent shadow-lg shadow-accent/30'
                       : 'bg-white dark:bg-neutral-800 border-neutral-200 dark:border-neutral-700 group-hover:border-accent/50'">
                  <i :data-lucide="step.icon" class="w-6 h-6"></i>
                </div>
                <p class="text-xs font-semibold tracking-wider uppercase"
                   :class="activeStep === i ? 'text-accent' : 'text-neutral-500 dark:text-neutral-400'"
                   x-text="step.step"></p>
                <p class="text-xs text-neutral-400 mt-0.5 hidden sm:block" x-text="step.label"></p>
              </div>
            </template>
          </div>

          <!-- Expanded detail panel -->
          <div x-show="activeStep !== null"
               x-transition:enter="transition ease-out duration-300"
               x-transition:enter-start="opacity-0 -translate-y-2"
               x-transition:enter-end="opacity-100 translate-y-0"
               class="rounded-2xl p-6 bg-white dark:bg-neutral-800/60 border border-neutral-200 dark:border-neutral-700 max-w-lg mx-auto">
            <template x-if="activeStep !== null">
              <div>
                <div class="flex items-center gap-3 mb-3">
                  <div class="w-10 h-10 rounded-xl bg-accent/10 flex items-center justify-center">
                    <i :data-lucide="d.methodology[activeStep].icon" class="w-5 h-5 text-accent"></i>
                  </div>
                  <h3 class="font-serif text-lg font-semibold" x-text="d.methodology[activeStep].label"></h3>
                </div>
                <p class="text-sm leading-relaxed text-neutral-600 dark:text-neutral-400" x-text="d.methodology[activeStep].detail"></p>
              </div>
            </template>
          </div>

          <p x-show="activeStep === null" class="text-center text-sm text-neutral-400 mt-2">
            Click a step above to learn more.
          </p>
        </div>
      </section>


      <!-- ========================================================== -->
      <!--  TECHNICAL STACK (JSON-driven)                              -->
      <!-- ========================================================== -->
      <section id="stack" class="py-20 px-6 bg-neutral-50 dark:bg-neutral-900/50">
        <div class="max-w-3xl mx-auto fade-section">
          <h2 class="font-serif text-3xl font-bold mb-12">Technical Stack</h2>
          <div class="space-y-8">
            <template x-for="(cat, i) in d.stack" :key="i">
              <div>
                <h3 class="text-sm tracking-widest uppercase text-accent mb-3 font-semibold" x-text="cat.category"></h3>
                <div class="flex flex-wrap gap-2">
                  <template x-for="(skill, j) in cat.skills" :key="j">
                    <span class="badge bg-white dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700" x-text="skill"></span>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>
      </section>


      <!-- ========================================================== -->
      <!--  CURRENTLY READING + LIVE METRICS (JSON-driven)             -->
      <!-- ========================================================== -->
      <section id="reading" class="py-20 px-6">        <div class="max-w-3xl mx-auto fade-section">
          <h2 class="font-serif text-3xl font-bold mb-4">Currently Reading</h2>
          <p class="text-sm text-neutral-500 dark:text-neutral-400 mb-8">
            A live peek into what's on my desk — books, papers, and ideas shaping my thinking.
          </p>

          <!-- Book widget -->
          <div class="hover-lift rounded-2xl p-6 bg-white dark:bg-neutral-800/60 border border-neutral-200 dark:border-neutral-700 max-w-md">            <div class="flex items-start gap-4">
              <div class="flex-shrink-0 mt-1">
                <i data-lucide="book-open" class="w-8 h-8 text-accent"></i>
              </div>
              <div class="flex-grow">
                <h3 class="font-serif text-base font-semibold leading-snug" x-text="d.reading.title"></h3>
                <p class="text-xs text-neutral-500 dark:text-neutral-400 mt-0.5" x-text="d.reading.author + ' · ' + d.reading.publisher"></p>
                <div class="mt-3 w-full bg-neutral-200 dark:bg-neutral-700 rounded-full h-1.5">
                  <div class="bg-accent h-1.5 rounded-full transition-all duration-500"
                       :style="'width:' + d.reading.progress + '%'"></div>
                </div>
                <p class="text-xs text-neutral-400 mt-1.5" x-text="d.reading.progress + '% complete'"></p>
              </div>
            </div>
          </div>

          <!-- Live metrics -->
          <div class="mt-6 flex flex-wrap gap-4">
            <template x-for="(metric, i) in d.metrics" :key="i">
              <div class="hover-lift rounded-xl p-4 bg-white dark:bg-neutral-800/60 border border-neutral-200 dark:border-neutral-700 text-center min-w-[140px]">
                <p class="text-2xl font-bold text-accent font-serif" x-text="metric.value"></p>
                <p class="text-xs text-neutral-500 dark:text-neutral-400 mt-1" x-text="metric.label"></p>
              </div>
            </template>
          </div>
        </div>
      </section>


      <!-- ========================================================== -->
      <!--  ★ NEW FEATURE 3: GITHUB-STYLE ACTIVITY HEATMAP             -->
      <!--  Visual proof of consistency — speaks to DS leaders          -->
      <!-- ========================================================== -->
      <section id="activity" class="py-20 px-6 bg-neutral-50 dark:bg-neutral-900/50">

  <!-- ============================================================== -->
  <!--  ALPINE.JS COMPONENT                                            -->
  <!--  Fetches data/portfolio.json and exposes all reactive state     -->
  <!-- ============================================================== -->
  <script>
    /**
     * portfolio() — The main Alpine.js data function.
     *
     * On init it fetches data/portfolio.json and populates `this.d`
     * which is the reactive data object driving every section.
     *
     * ALL dynamic content is rendered via Alpine directives (x-text,
     * x-html, x-for), so updating the JSON file is the ONLY change
     * needed to update site content.
     */
    function portfolio() {
      return {
        /* ── State ── */
        darkMode: window.matchMedia('(prefers-color-scheme: dark)').matches,
        mobileNav: false,
        loaded: false,
        activeStep: null,       // Methodology: which step is expanded
        d: {},                  // Portfolio data object (from JSON)

        /* ── Lifecycle ── */
        init() {
          // Fetch portfolio data from JSON
          fetch('data/portfolio.json')
            .then(r => {
              if (!r.ok) throw new Error('Failed to load portfolio data');
              return r.json();
            })
            .then(data => {
              this.d = data;
              this.loaded = true;

              // Re-create Lucide icons after Alpine renders templates
              this.$nextTick(() => {
                lucide.createIcons();
                this.initScrollObserver();
              });
            })
            .catch(err => {
              console.error('Portfolio data load error:', err);
              // Graceful fallback with empty structure
              this.d = {
                meta: { name: '', initials: '', title: '', taglineBefore: '', taglineHighlight1: '', taglineMiddle: '', taglineHighlight2: '', cvPath: '', footer: '' },
                social: { linkedin: '', github: '', email: '', scholar: '' },
                experience: [], education: [], projects: [], stack: [],
                publications: [], methodology: [],
                reading: { title: '', author: '', publisher: '', progress: 0 },
                metrics: [],
                githubActivity: { weeks: [], description: '' }
              };
              this.loaded = true;
            });
        },

        /* ── Scroll-triggered fade-in ── */
        initScrollObserver() {
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach(e => {
                if (e.isIntersecting) e.target.classList.add('visible');
              });
            },
            { threshold: 0.08 }
          );
          document.querySelectorAll('.fade-section').forEach(s => observer.observe(s));
        },

        /* ── Heatmap color helper ── */
        heatmapColor(level) {
          const colors = [
            'bg-neutral-200 dark:bg-neutral-800',
            'bg-indigo-200 dark:bg-indigo-900/60',
            'bg-indigo-300 dark:bg-indigo-700/60',
            'bg-indigo-400 dark:bg-indigo-500/70',
            'bg-accent dark:bg-indigo-400',
            'bg-indigo-600 dark:bg-indigo-300',
          ];
          return colors[Math.min(level, colors.length - 1)];
        },

        /* ── Heatmap tooltip helper ── */
        heatmapLabel(level) {
          const labels = ['No activity', 'Light', 'Moderate', 'Active', 'Very active', 'Intense'];
          return labels[Math.min(level, labels.length - 1)];
        },
      };
    }
  </script>
